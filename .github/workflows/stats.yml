name: Update GitHub stats

on:
  schedule:
    - cron: "0 3 * * *"
  push:
    paths:
      - ".github/workflows/stats.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download stats card
        run: |
          curl -o stats.svg "https://github-readme-stats.vercel.app/api?username=omarzairi&show_icons=true&theme=tokyonight&hide_border=true&rank_icon=github&include_all_commits=true"

      - name: Commit stats
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add stats.svg
          git commit -m "Update stats" || exit 0
          git push
